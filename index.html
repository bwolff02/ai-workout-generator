  }
  .pr-card.new-pr { border-left: 3px solid #ffd700; }
  .pr-name { font-size: 13px; font-weight: 600; }
  .pr-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .pr-weight { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: #ffd700; }
  .pr-reps { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
  .no-data-msg { font-size: 13px; color: var(--muted); text-align: center; padding: 40px 20px; line-height: 1.7; }
  .pr-badge {
    display: inline-block;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: #ffd700;
    padding: 2px 6px;
    letter-spacing: .08em;
    margin-left: 6px;
    vertical-align: middle;
  }


  .set-notes-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 0 2px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .set-notes-toggle.has-note { color: var(--blue); }
  .set-notes-area {
    margin: 2px 0 6px 24px;
    display: none;
  }
  .set-notes-area.open { display: block; }
  .set-note-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 300;
    padding: 7px 10px;
    outline: none;
    resize: none;
    min-height: 44px;
    line-height: 1.5;
    font-style: italic;
  }
  .set-note-input:focus { border-color: var(--blue); }
  .set-note-input::placeholder { color: var(--muted); font-style: italic; }


  .deload-banner {
    background: rgba(255,159,67,0.1);
    border: 1px solid rgba(255,159,67,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .deload-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .deload-text { font-size: 12px; color: var(--orange); line-height: 1.5; }
  .deload-text strong { color: var(--orange); font-weight: 600; }
  .deload-toggle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--orange);
    background: none;
    border: 1px solid rgba(255,159,67,0.3);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 6px;
    display: inline-block;
  }
  .week-badge.deload { background: rgba(255,159,67,0.1); color: var(--orange); border: 1px solid rgba(255,159,67,0.4); }


  .save-success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,13,13,0.95);
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: fadeInSuccess 0.2s ease;
  }
  @keyframes fadeInSuccess {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .save-success-icon {
    font-size: 64px;
    margin-bottom: 16px;
    animation: popIn 0.4s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .save-success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: .05em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .save-success-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
  }

  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--accent);color:var(--black);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:999;transition:transform .3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="toast" id="toast">Workout saved!</div>

<!-- Landing Page Modal -->
<div id="landingModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;">
  <div style="background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:40px;max-width:500px;text-align:center;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;margin-bottom:12px;">MY TRAINING</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.5;">Choose how you want to use the app. Build a personalized program with AI, or start logging workouts right away.</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <button onclick="startTracking()" style="background:var(--accent);color:var(--black);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;padding:14px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;text-transform:uppercase;">📝 Start Tracking</button>
      <button onclick="localStorage.removeItem('trackingOnly');window.location.href='generator.html'" style="background:var(--card);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;padding:14px 20px;border-radius:8px;border:1px solid rgba(200,241,53,.3);cursor:pointer;text-transform:uppercase;">⚡ Build Program</button>
    </div>
  </div>
</div>

<header>
  <div class="header-top">
    <div>
      <div class="program-label">Bryce — Training Log</div>
      <h1>MY <span>PROGRAM</span></h1>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.1em;">v2.6.62</div>
    </div>
    <a href="generator.html" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);text-decoration:none;letter-spacing:.1em;padding:6px 12px;border:1px solid rgba(200,241,53,.3);border-radius:6px;background:var(--accent-dim);">⚡ BUILD PROGRAM</a>
  </div>
  <div class="week-indicator">
    <span class="week-badge" id="weekBadge" onclick="toggleWeek()" style="cursor:pointer;user-select:none;"></span>
    <span class="week-label" id="weekLabel"></span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-left:4px;cursor:pointer;" onclick="toggleWeek()">↺ tap to flip</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,159,67,0.6);margin-left:8px;cursor:pointer;" onclick="toggleDeload()">🔋 deload</span>
  </div>
  <div id="generated-banner" style="display:none;background:rgba(200,241,53,0.08);border:1px solid rgba(200,241,53,.2);border-radius:6px;padding:8px 12px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);align-items:center;justify-content:space-between;">
    <span>⚡ Using AI-generated program</span>
    <span style="color:var(--muted);cursor:pointer;text-decoration:underline;" onclick="if(confirm('Switch back to the default program? Your generated program will still be saved.')){localStorage.removeItem('active_generated_program');location.reload();}">reset to default</span>
  </div>
  <div id="tracking-only-controls" style="display:none;padding:12px 20px;border-top:1px solid var(--border);background:var(--dark);">
    <div style="max-width:640px;margin:0 auto;display:flex;gap:8px;align-items:center;">
      <select id="daySelector" onchange="isTrackingOnly ? switchTrackingDay(this.value) : switchDay(this.value)" style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--white);padding:8px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;outline:none;">
        <option value="">Select a day...</option>
      </select>
      <button onclick="showCreateDayModal()" style="background:var(--accent);color:var(--black);padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;font-weight:600;">+ New Day</button>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>

<!-- Create Day Modal -->
<div id="createDayModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;">
  <div style="background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:12px;">Name Your Day</div>
    <input id="dayNameInput" type="text" placeholder="e.g., Push Day, Leg Day, Upper Body" style="width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--white);padding:10px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;outline:none;box-sizing:border-box;margin-bottom:16px;" onkeypress="if(event.key==='Enter')saveDayName()">
    <div style="display:flex;gap:8px;">
      <button onclick="closeCreateDayModal()" style="flex:1;background:var(--card);color:var(--muted);padding:10px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;">Cancel</button>
      <button onclick="saveDayName()" style="flex:1;background:var(--accent);color:var(--black);padding:10px;border-radius:6px;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;font-weight:600;">Create</button>
    </div>
  </div>
</div>

<main id="mainContent"></main>
<div class="save-bar">
  <button class="btn btn-ghost" onclick="clearDay()">Clear</button>
  <button class="btn btn-accent" onclick="saveDay()">Save Workout</button>
</div>
<script>

// ─── WEEK DETECTION ───────────────────────────────────────────
// Week A = odd ISO week number (heavy Mon/Fri, volume Thu/Sat)
// Week B = even ISO week number (volume Mon/Fri, heavy Thu/Sat)
function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay() || 7));
  const yearStart = new Date(d.getFullYear(), 0, 1);
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

const today = new Date();
const isoWeek = getISOWeek(today);
let isWeekA = isoWeek % 2 === 1; // odd weeks = Week A (tappable to override)
let isDeloadWeek = isoWeek % 4 === 0; // every 4th week = deload

// ─── PROGRAM DATA ─────────────────────────────────────────────
// Load generated program from localStorage if available, otherwise use hardcoded default.
const _generatedProgram = (() => {
  try {
    const saved = localStorage.getItem('active_generated_program');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
})();

// Each day has weekA and weekB variants
const PROGRAM = _generatedProgram || [];

// ─── HISTORICAL DATA ──────────────────────────────────────────
const HISTORY = {};

// ─── STATE ────────────────────────────────────────────────────
let currentDay = 0;
let sessionLogs = {};
let justSavedDay = null; // index of day just saved, to force blank reload
let isTrackingOnly = localStorage.getItem('trackingOnly') === 'true';
let trackingDays = JSON.parse(localStorage.getItem('trackingDays') || '[]');
let currentTrackingDay = null;

// ─── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  // Show landing modal if this is first load and no program/tracking mode
  const hasProgram = !!_generatedProgram || localStorage.getItem('active_generated_program');
  const isFirstLoad = !localStorage.getItem('appState_initialized');

  if (isFirstLoad && !hasProgram && !isTrackingOnly) {
    document.getElementById('landingModal').style.display = 'flex';
    localStorage.setItem('appState_initialized', 'true');
    return;
  }

  // If they have a generated program, use normal tracker (program takes precedence)
  if (hasProgram) {
    isTrackingOnly = false;
    localStorage.removeItem('trackingOnly');
    initNormalTracker();
  } else if (isTrackingOnly) {
    initTrackingOnly();
  } else {
    initNormalTracker();
  }
});

function initTrackingOnly() {
  document.getElementById('tracking-only-controls').style.display = 'block';
  document.getElementById('dayTabs').style.display = 'none';
  document.getElementById('weekBadge').style.display = 'none';
  document.getElementById('weekLabel').style.display = 'none';

  // Load tracking days into selector
  const selector = document.getElementById('daySelector');
  trackingDays.forEach((day, idx) => {
    const opt = document.createElement('option');
    opt.value = idx;
    opt.textContent = day.name;
    selector.appendChild(opt);
  });

  if (trackingDays.length > 0) {
    currentTrackingDay = 0;
    selector.value = 0;
    switchTrackingDay(0);
  } else {
    const main = document.getElementById('mainContent');
    main.innerHTML = '<div style="max-width:640px;margin:0 auto;padding:40px 20px;text-align:center;color:var(--muted);"><div style="font-size:14px;">No days created yet. Click "+ New Day" to get started!</div></div>';
  }
}

function initNormalTracker() {
  if (_generatedProgram) {
    const banner = document.getElementById('generated-banner');
    if (banner) banner.style.display = 'flex';
  }
  setWeekBadge();
  buildTabs();
  loadDay(0);
}

function startTracking() {
  localStorage.setItem('trackingOnly', 'true');
  localStorage.setItem('appState_initialized', 'true');
  isTrackingOnly = true;
  document.getElementById('landingModal').style.display = 'none';
  initTrackingOnly();
}

function showCreateDayModal() {
  document.getElementById('createDayModal').style.display = 'flex';
  document.getElementById('dayNameInput').focus();
}

function closeCreateDayModal() {
  document.getElementById('createDayModal').style.display = 'none';
  document.getElementById('dayNameInput').value = '';
}

function saveDayName() {
  const name = document.getElementById('dayNameInput').value.trim();
  if (!name) return;

  const newDay = { name, exercises: [], createdAt: Date.now() };
  trackingDays.push(newDay);
  localStorage.setItem('trackingDays', JSON.stringify(trackingDays));

  const selector = document.getElementById('daySelector');
  const opt = document.createElement('option');
  opt.value = trackingDays.length - 1;
  opt.textContent = name;
  selector.appendChild(opt);
  selector.value = trackingDays.length - 1;

  closeCreateDayModal();
  switchDay(trackingDays.length - 1);
}

function switchTrackingDay(dayIdx) {
  if (!isTrackingOnly) return;
  currentTrackingDay = parseInt(dayIdx);
  if (isNaN(currentTrackingDay) || currentTrackingDay >= trackingDays.length) return;

  const day = trackingDays[currentTrackingDay];
  sessionLogs = { _date: new Date().toISOString().split('T')[0], _feel: 7, _notes: '', _custom: [] };

  const main = document.getElementById('mainContent');
  let html = `
    <div style="max-width:640px;margin:0 auto;padding:20px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.04em;margin-bottom:4px;">${day.name}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Log your exercises</div>

      <div class="field-group">
        <label style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;display:block;">Add Exercise</label>
        <input type="text" id="exerciseSearch" placeholder="Search exercises..." style="width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--white);padding:10px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;outline:none;box-sizing:border-box;" onkeyup="updateExerciseDropdown()">
        <div id="exerciseDropdown" style="margin-top:4px;max-height:200px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:6px;display:none;"></div>
      </div>

      <div id="trackingExercises" style="margin-top:20px;"></div>
    </div>
  `;
  main.innerHTML = html;
  renderTrackingExercises();
}

function updateExerciseDropdown() {
  const query = document.getElementById('exerciseSearch').value.toLowerCase();
  const dropdown = document.getElementById('exerciseDropdown');

  if (!query) {
    dropdown.style.display = 'none';
    return;
  }

  const baselineExercises = getBaselineExercises();
  const customExercises = getCustomExercises();
  const allExercises = [...baselineExercises, ...customExercises];

  const filtered = allExercises.filter(ex => ex.name.toLowerCase().includes(query));

  if (filtered.length === 0) {
    dropdown.innerHTML = `<div style="padding:8px 12px;color:var(--muted);font-size:12px;">No matches. <span style="color:var(--accent);cursor:pointer;" onclick="addCustomExercise('${document.getElementById('exerciseSearch').value}')">Create custom</span></div>`;
    dropdown.style.display = 'block';
    return;
  }

  dropdown.innerHTML = filtered.map((ex, idx) =>
    `<div onclick="selectExercise('${ex.id}','${ex.name}')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='transparent'">${ex.name}</div>`
  ).join('');
  dropdown.style.display = 'block';
}

function selectExercise(id, name) {
  if (!sessionLogs._custom) sessionLogs._custom = [];

  sessionLogs._custom.push({
    id: id,
    name: name,
    sets: [{ weight: '', reps: '' }]
  });

  document.getElementById('exerciseSearch').value = '';
  document.getElementById('exerciseDropdown').style.display = 'none';
  renderTrackingExercises();
}

function addCustomExercise(name) {
  const trimmed = name.trim();
  if (!trimmed) return;

  // Save custom exercise to localStorage
  const custom = JSON.parse(localStorage.getItem('customExercises') || '[]');
  if (!custom.find(e => e.name === trimmed)) {
    custom.push({ id: 'custom_' + Date.now(), name: trimmed });
    localStorage.setItem('customExercises', JSON.stringify(custom));
  }

  selectExercise('custom_' + Date.now(), trimmed);
}

function getBaselineExercises() {
  // Return a curated list of baseline exercises
  return [
    { id: 'barbell_squat', name: 'Barbell Squat' },
    { id: 'barbell_bench', name: 'Barbell Bench Press' },
    { id: 'rdl', name: 'Romanian Deadlift' },
    { id: 'military_press', name: 'Military Press' },
    { id: 'barbell_row', name: 'Barbell Row' },
    { id: 'wtd_pullup', name: 'Weighted Pull-Up' },
    { id: 'lat_pulldown_machine', name: 'Lat Pulldown' },
    { id: 'seated_row', name: 'Seated Row' },
    { id: 'leg_press_exercise', name: 'Leg Press' },
    { id: 'leg_extension', name: 'Leg Extension' },
    { id: 'prone_leg_curl', name: 'Prone Leg Curl' },
    { id: 'cable_fly_htl', name: 'Cable Fly (High to Low)' },
    { id: 'cable_lateral_raise', name: 'Cable Lateral Raise' },
    { id: 'face_pull', name: 'Face Pull' },
    { id: 'db_curl', name: 'Dumbbell Curl' },
    { id: 'rope_pushdown', name: 'Rope Pushdown' },
    { id: 'cable_crunch', name: 'Cable Crunch' },
    { id: 'incline_smith', name: 'Incline Smith Press' },
    { id: 'hammer_curl', name: 'Hammer Curl' },
    { id: 'skull_crusher', name: 'Skull Crusher' }
  ];
}

function getCustomExercises() {
  return JSON.parse(localStorage.getItem('customExercises') || '[]');
}

function renderTrackingExercises() {
  const container = document.getElementById('trackingExercises');
  if (!sessionLogs._custom || sessionLogs._custom.length === 0) {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">No exercises logged yet. Search above to add one.</div>';
    return;
  }

  container.innerHTML = sessionLogs._custom.map((ex, idx) => `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-weight:500;font-size:14px;">${ex.name}</div>
        <button onclick="removeExercise(${idx})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;">✕</button>
      </div>
      <div style="display:flex;gap:8px;">
        <input type="number" placeholder="lbs" value="${ex.sets[0]?.weight || ''}" onchange="updateExerciseSet(${idx},0,'weight',this.value)" style="width:80px;background:var(--input-bg);border:1px solid var(--border);color:var(--white);padding:6px;border-radius:4px;font-size:12px;">
        <span style="color:var(--muted);font-size:12px;align-self:center;">×</span>
        <input type="number" placeholder="reps" value="${ex.sets[0]?.reps || ''}" onchange="updateExerciseSet(${idx},0,'reps',this.value)" style="width:60px;background:var(--input-bg);border:1px solid var(--border);color:var(--white);padding:6px;border-radius:4px;font-size:12px;">
      </div>
    </div>
  `).join('');
}

function removeExercise(idx) {
  if (sessionLogs._custom) {
    sessionLogs._custom.splice(idx, 1);
    renderTrackingExercises();
  }
}

function updateExerciseSet(exIdx, setIdx, field, value) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  const ex = sessionLogs._custom[exIdx];
  if (!ex.sets[setIdx]) ex.sets[setIdx] = {};
  ex.sets[setIdx][field] = value;
}

function setWeekBadge() {
  const badge = document.getElementById('weekBadge');
  const label = document.getElementById('weekLabel');
  if (isDeloadWeek) {
    badge.textContent = 'DELOAD';
    badge.className = 'week-badge deload';
    label.textContent = 'Recovery week — 60-70% weight, higher reps';
  } else if (isWeekA) {
    badge.textContent = 'WEEK A';
    badge.className = 'week-badge week-a';
    label.textContent = 'Heavy Mon/Tue/Sat · Volume Wed/Thu/Fri';
  } else {
    badge.textContent = 'WEEK B';
    badge.className = 'week-badge week-b';
    label.textContent = 'Volume Mon/Tue/Sat · Heavy Wed/Thu/Fri';
  }
}

function getCurrentVariant(dayIndex) {
  const day = PROGRAM[dayIndex];
  if (day.rest) return null;
  return isWeekA ? day.weekA : day.weekB;
}

function buildTabs() {
  const tabsEl = document.getElementById('dayTabs');
  PROGRAM.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.innerHTML = `${day.label}<span class="tab-dot" id="dot-${i}"></span>`;
    btn.onclick = () => switchDay(i);
    tabsEl.appendChild(btn);
  });
  const progressBtn = document.createElement('button');
  progressBtn.className = 'tab';
  progressBtn.id = 'progress-tab-btn';
  progressBtn.textContent = '📈 Progress';
  progressBtn.onclick = () => showProgressTab();
  tabsEl.appendChild(progressBtn);
}

async function switchDay(index) {
  currentDay = index;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  const ptab = document.getElementById('progress-tab-btn');
  if (ptab) ptab.classList.remove('active');
  await loadDay(index);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadDay(index) {
  if (isTrackingOnly) return; // Skip normal day loading in tracking-only mode
  const variant = getCurrentVariant(index);
  if (!variant) { renderDay(index); return; }
  const saved = await loadFromDB('log_' + variant.id);
  const today = new Date().toISOString().split('T')[0];

  if (justSavedDay === index) {
    // Just saved this day - force blank inputs regardless of date match
    sessionLogs = {};
    justSavedDay = null;
  } else if (saved && saved._date && saved._date !== today) {
    // Saved log is from a previous date - clear inputs but keep history
    sessionLogs = {};
  } else {
    sessionLogs = saved || {};
  }

  const dot = document.getElementById('dot-' + index);
  if (dot) dot.classList.toggle('has-log', !!(saved && saved._date === today));
  renderDay(index);
}

function renderDay(index) {
  const main = document.getElementById('mainContent');
  const day = PROGRAM[index];
  if (day.rest) {
    main.innerHTML = `<div class="rest-day"><div class="rest-icon">🔋</div><div class="rest-title">REST DAY</div><div class="rest-desc">Six hard days. Sleep, eat your protein, and let the adaptation happen. The work is already done.</div></div>`;
    return;
  }
  const variant = getCurrentVariant(index);
  const today = new Date().toISOString().split('T')[0];
  const savedDate = sessionLogs._date || today;
  const isVol = variant.tag === 'volume';

  let html = `<div class="day-header"><div>
    <div class="day-number">Day ${index + 1} · ${day.label.split('·')[0].trim()} · ${isWeekA ? 'Week A' : 'Week B'} · ${variant.tag.toUpperCase()}</div>
    <div class="day-title">${variant.title}</div>
    <div class="day-subtitle">${variant.subtitle}</div>
  </div><span class="tag tag-${variant.tag}">${variant.tag}</span></div>`;

  const savedFeel = sessionLogs._feel || 7;
  const savedNotes = sessionLogs._notes || '';
  const feelEmoji = getFeel(savedFeel);
  html += `<div class="session-row"><input type="date" class="session-date-input" id="sessionDate" value="${savedDate}"></div>`;
  if (isDeloadWeek) {
    html += `<div class="deload-banner">
      <div class="deload-icon">🔋</div>
      <div class="deload-text">
        <strong>Deload Week</strong> — 60–70% of working weight, 3–4 sets at 12–15 reps. No grinding. Focus on form and feel.<br>
        <button class="deload-toggle" onclick="toggleDeload()">↺ Switch to normal week</button>
      </div>
    </div>`;
  }
  html += `<div class="session-meta">
    <div class="session-meta-label">Session Check-In</div>
    <div class="feel-row">
      <span class="feel-label">Feel</span>
      <input type="range" class="feel-slider" id="feelSlider" min="1" max="10" value="${savedFeel}"
        oninput="updateFeel(this.value)"/>
      <span class="feel-value" id="feelValue">${savedFeel}</span>
      <span class="feel-emoji" id="feelEmoji">${feelEmoji}</span>
    </div>
    <textarea class="session-notes-input" id="sessionNotes" placeholder="How did you feel? Anything to note about today's session..."
      oninput="sessionLogs._notes = this.value">${savedNotes}</textarea>
  </div>`;

  let accessoriesSectionId = null;
  variant.sections.forEach((section, sIdx) => {
    // Target the actual "Accessories" section by label, not just whichever
    // section happens to be last (legs days have an Abs section after it).
    const isAccessoriesSection = section.label === 'Accessories';
    const sectionId = isAccessoriesSection ? `section-accessories-${index}` : '';
    if (isAccessoriesSection) accessoriesSectionId = sectionId;
    html += `<div class="section"${sectionId ? ` id="${sectionId}"` : ''}><div class="section-label">${section.label}</div>`;
    section.exercises.forEach(ex => {
      if (ex.superset) {
        html += `<div class="superset-block"><div class="superset-header">⚡ Superset — back to back</div>`;
        ex.exercises.forEach((sex, si) => {
          html += renderExercise(sex, isVol);
          if (si < ex.exercises.length - 1) html += `<div class="superset-divider">↕ then immediately</div>`;
        });
        html += `</div>`;
      } else {
        html += renderExercise(ex, isVol);
      }
    });
    html += `</div>`;
  });

  // Fallback: if no section was labeled "Accessories", use the last rendered
  // section so the Add Exercise / Add Superset buttons always have a target.
  if (!accessoriesSectionId && variant.sections.length) {
    accessoriesSectionId = `section-accessories-${index}`;
  }

  // Deload extras - extra accessories only shown during deload week
  if (isDeloadWeek) {
    const deloadExtras = getDeloadExtras(variant.id);
    if (deloadExtras.length > 0) {
      html += `<div class="section"><div class="section-label" style="color:var(--orange);">🔋 Deload Extras</div>`;
      deloadExtras.forEach(ex => {
        html += renderExercise(ex, true);
      });
      html += `</div>`;
    }
  }
  main.innerHTML = html;
  appendHistoryAndAddExercise(index, variant);
}

function appendHistoryAndAddExercise(index, variant) {
  const main = document.getElementById('mainContent');
  const accessoriesId = `section-accessories-${index}`;

  // --- ADD EXERCISE SECTION ---
  // New exercises append directly into the Accessories section so they're mixed
  // in with everything else and can be moved up/down relative to other cards.
  const addSection = document.createElement('div');
  addSection.className = 'add-exercise-section';
  addSection.innerHTML = `
    <button class="add-exercise-btn" onclick="addCustomExercise('${accessoriesId}')">+ Add Exercise</button>
    <button class="add-superset-btn" onclick="addCustomSuperset('${accessoriesId}', ${index})">⚡ Add Superset</button>
    <button class="add-superset-btn" style="margin-top:4px;" onclick="startPairMode(${index})">🔗 Pair Existing Exercises</button>
    <div id="superset-mode-banner-${index}"></div>
  `;
  main.appendChild(addSection);
  
  // Restore any already-added custom exercises for this session
  const customExercises = sessionLogs._custom || [];
  customExercises.forEach((ex, i) => {
    appendCustomExerciseCard(index, i, ex.name, ex.sets, accessoriesId);
  });

  // --- HISTORY SECTION ---
  const histSection = document.createElement('div');
  histSection.className = 'history-section';
  
  const sessions = variant ? getMuscleGroupHistory(variant) : [];
  const recent = sessions.slice(-4).reverse();

  let histHtml = `<div class="history-section-label"><span>Past Sessions</span><button class="history-toggle-btn" onclick="toggleHistory(this)">HIDE</button></div>`;
  histHtml += `<div id="history-entries">`;
  
  if (!recent.length) {
    histHtml += `<div style="font-size:12px;color:var(--muted);padding:8px 0;">No sessions logged yet — this will populate after you save workouts.</div>`;
  } else {
    recent.forEach((session, displayIdx) => {
      const feelStr = session.feel ? `${getFeel(session.feel)} ${session.feel}/10` : '';

      histHtml += `<div class="history-entry" id="hist-entry-${displayIdx}">
        <div class="history-entry-header">
          <span class="history-entry-date">${session.date}</span>
          <span class="history-entry-week">${session.week || ''} ${feelStr}</span>
        </div>
        ${session.notes ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-style:italic;">"${session.notes}"</div>` : ''}
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="history-edit-btn" onclick="editSession('${session._srcKey}', ${session._srcIdx})">✏️ Edit Notes</button>
          <button class="history-edit-btn" style="color:#ff6b6b;border-color:rgba(255,107,107,0.3);" onclick="confirmDeleteSession('${session._srcKey}', ${session._srcIdx})">🗑 Delete</button>
        </div>`;
      let lastGroup = null;
      (session.exercises || []).forEach((ex, exIdx) => {
        if (!ex.sets || !ex.sets.length) return;
        const validSets = ex.sets.filter(s => s.weight || s.reps);
        if (!validSets.length) return;
        const setsStr = validSets.map(s => `${s.weight||'BW'}×${s.reps||'?'}`).join('  ');
        const hasNotes = validSets.some(s => s.note && s.note.trim());
        const notesStr = hasNotes ? validSets.filter(s => s.note).map(s => s.note).join(' / ') : '';
        
        const inSuperset = !!ex.supersetGroup;
        const isNewGroup = inSuperset && ex.supersetGroup !== lastGroup;
        
        if (isNewGroup) {
          histHtml += `<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-top:6px;margin-bottom:2px;">⚡ superset</div>`;
        }
        
        const indentStyle = inSuperset ? 'margin-left:10px;border-left:2px solid rgba(100,180,255,0.3);padding-left:8px;' : '';
        
        histHtml += `<div class="history-exercise" style="${indentStyle}">
          <div class="history-exercise-name">${ex.name}</div>
          <div class="history-sets">${setsStr}</div>
          ${notesStr ? `<div style="font-size:10px;color:var(--muted);font-style:italic;margin-top:2px;">${notesStr}</div>` : ''}
        </div>`;
        
        lastGroup = ex.supersetGroup || null;
      });
      histHtml += `</div>`;
    });
  }
  histHtml += `</div>`;
  histSection.innerHTML = histHtml;
  main.appendChild(histSection);

  // Export/Import section
  const exportSection = document.createElement('div');
  exportSection.style.marginTop = '20px';
  exportSection.innerHTML = `
    <button class="export-btn" onclick="exportData()">📤 Export All Data (Copy to Notes)</button>
    <button class="export-btn" style="margin-top:4px;" onclick="toggleImport(this)">📥 Import / Restore Data</button>
    <div id="import-area" style="display:none;" class="import-area">
      <div class="import-label">Paste exported data below</div>
      <textarea class="import-textarea" id="import-text" placeholder="Paste your exported data here..."></textarea>
      <button class="import-btn" onclick="importData()">Restore Data</button>
    </div>
  `;
  main.appendChild(exportSection);
}

function toggleHistory(btn) {
  const entries = document.getElementById('history-entries');
  if (entries.style.display === 'none') {
    entries.style.display = 'block';
    btn.textContent = 'HIDE';
  } else {
    entries.style.display = 'none';
    btn.textContent = 'SHOW';
  }
}

function addCustomExercise(listId) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  const idx = sessionLogs._custom.length;
  sessionLogs._custom.push({ name: 'Exercise Name', sets: [{ weight: '', reps: '' }] });
  appendCustomExerciseCard(currentDay, idx, 'Exercise Name', [], listId);
}

function appendCustomExerciseCard(dayIndex, idx, name, existingSets, listId) {
  const list = document.getElementById(listId || ('custom-list-' + dayIndex));
  if (!list) return;
  const card = document.createElement('div');
  card.className = 'custom-exercise-card';
  card.id = 'custom-ex-' + idx;

  let setsHtml = (existingSets && existingSets.length ? existingSets : [{ weight: '', reps: '' }]).map((s, si) => {
    const hasNote = s.note && s.note.trim().length > 0;
    return `<div class="set-entry">
      <span class="set-num">S${si+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateCustomSet(${idx},${si},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateCustomSet(${idx},${si},'reps',this.value)"/>
      <button class="drop-set-link" onclick="addCustomDropSet(${idx}, ${si}, 0, this)">↓ drop</button>
      <button class="set-notes-toggle ${hasNote ? 'has-note' : ''}" onclick="toggleCustomSetNote(this, ${idx}, ${si})">✎ note</button>
    </div>
    <div class="set-notes-area ${hasNote ? 'open' : ''}" id="custom-set-note-area-${idx}-${si}">
      <textarea class="set-note-input" placeholder="How did that feel? Anything to note..."
        oninput="updateCustomSetNote(${idx}, ${si}, this.value)">${s.note || ''}</textarea>
    </div>
    <div id="custom-drops-${idx}-${si}-0"></div>`;
  }).join('');

  card.style.position = 'relative';
  card.dataset.anchor = '0';
  card.innerHTML = `
    <button class="promote-btn" onclick="toggleAnchor(this)" title="Promote to anchor" style="position:absolute;top:8px;right:84px;width:22px;height:22px;background:var(--card2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;">★</button>
    <button class="move-btn move-btn-up" onclick="moveCard(this, -1)" title="Move up">▲</button>
    <button class="move-btn move-btn-down" onclick="moveCard(this, 1)" title="Move down">▼</button>
    <button class="delete-exercise-btn" onclick="removeCustomExercise(${idx})" title="Remove">✕</button>
    <div class="custom-exercise-header" style="padding-right:114px;">
      <input class="custom-exercise-input" type="text" placeholder="Exercise name"
        value="${name === 'Exercise Name' ? '' : name}"
        oninput="updateCustomName(${idx}, this.value)" />
    </div>
    <div class="log-area">
      <div id="custom-sets-${idx}">${setsHtml}</div>
      <button class="add-set-btn" onclick="addCustomSet(${idx})">+ Add Set</button>
    </div>`;
  list.appendChild(card);
}

function updateCustomName(idx, val) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  if (!sessionLogs._custom[idx]) sessionLogs._custom[idx] = { name: '', sets: [] };
  sessionLogs._custom[idx].name = val;
}

function updateCustomSet(idx, setIdx, field, val) {
  if (!sessionLogs._custom) sessionLogs._custom = [];
  if (!sessionLogs._custom[idx]) sessionLogs._custom[idx] = { name: '', sets: [] };
  if (!sessionLogs._custom[idx].sets) sessionLogs._custom[idx].sets = [];
  while (sessionLogs._custom[idx].sets.length <= setIdx) sessionLogs._custom[idx].sets.push({ weight:'', reps:'' });
  sessionLogs._custom[idx].sets[setIdx][field] = val;
}

function addCustomSet(idx) {
  if (!sessionLogs._custom || !sessionLogs._custom[idx]) return;
  if (!sessionLogs._custom[idx].sets) sessionLogs._custom[idx].sets = [];
  const si = sessionLogs._custom[idx].sets.length;
  sessionLogs._custom[idx].sets.push({ weight:'', reps:'', drops:[] });
  const container = document.getElementById('custom-sets-' + idx);
  const div = document.createElement('div');
  div.className = 'set-entry';
  div.innerHTML = `<span class="set-num">S${si+1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      onchange="updateCustomSet(${idx},${si},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      onchange="updateCustomSet(${idx},${si},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addCustomDropSet(${idx}, ${si}, 0, this)">↓ drop</button>
    <button class="set-notes-toggle" onclick="toggleCustomSetNote(this, ${idx}, ${si})">✎ note</button>`;
  container.appendChild(div);
  const noteArea = document.createElement('div');
  noteArea.className = 'set-notes-area';
  noteArea.id = `custom-set-note-area-${idx}-${si}`;
  noteArea.innerHTML = `<textarea class="set-note-input" placeholder="How did that feel? Anything to note..." oninput="updateCustomSetNote(${idx}, ${si}, this.value)"></textarea>`;
  container.appendChild(noteArea);
  const dropContainer = document.createElement('div');
  dropContainer.id = `custom-drops-${idx}-${si}-0`;
  container.appendChild(dropContainer);
}

function toggleCustomSetNote(btn, exIdx, setIdx) {
  const areaId = `custom-set-note-area-${exIdx}-${setIdx}`;
  const area = document.getElementById(areaId);
  if (!area) return;
  const isOpen = area.classList.contains('open');
  area.classList.toggle('open', !isOpen);
  if (!isOpen) {
    const ta = area.querySelector('textarea');
    if (ta) setTimeout(() => ta.focus(), 50);
  }
}

function updateCustomSetNote(exIdx, setIdx, value) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  if (!sessionLogs._custom[exIdx].sets[setIdx]) return;
  sessionLogs._custom[exIdx].sets[setIdx].note = value;
}


function addCustomDropSet(exIdx, setIdx, dropIdx, btn) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  if (!sessionLogs._custom[exIdx].sets[setIdx].drops) sessionLogs._custom[exIdx].sets[setIdx].drops = [];
  sessionLogs._custom[exIdx].sets[setIdx].drops.splice(dropIdx, 0, { weight:'', reps:'' });
  const containerId = dropIdx === 0
    ? `custom-drops-${exIdx}-${setIdx}-0`
    : `custom-drops-${exIdx}-${setIdx}-${dropIdx}`;
  const container = document.getElementById(containerId);
  if (!container) return;
  const di = dropIdx;
  container.insertAdjacentHTML('beforeend', `
    <div class="drop-set-row" id="customdroprow-${exIdx}-${setIdx}-${di}">
      <span class="drop-set-label">D${di+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        onchange="updateCustomDrop(${exIdx},${setIdx},${di},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        onchange="updateCustomDrop(${exIdx},${setIdx},${di},'reps',this.value)"/>
      <button class="drop-set-link" onclick="addCustomDropSet(${exIdx}, ${setIdx}, ${di+1}, this)">↓ drop</button>
      <button class="drop-set-remove" onclick="removeCustomDrop(${exIdx},${setIdx},${di},this)">✕</button>
    </div>
    <div id="custom-drops-${exIdx}-${setIdx}-${di+1}"></div>
  `);
}

function updateCustomDrop(exIdx, setIdx, dropIdx, field, val) {
  if (!sessionLogs._custom || !sessionLogs._custom[exIdx]) return;
  if (!sessionLogs._custom[exIdx].sets[setIdx].drops) return;
  if (sessionLogs._custom[exIdx].sets[setIdx].drops[dropIdx]) {
    sessionLogs._custom[exIdx].sets[setIdx].drops[dropIdx][field] = val;
  }
}

function removeCustomDrop(exIdx, setIdx, dropIdx, btn) {
  const row = document.getElementById(`customdroprow-${exIdx}-${setIdx}-${dropIdx}`);
  const cont = document.getElementById(`custom-drops-${exIdx}-${setIdx}-${dropIdx+1}`);
  if (row) row.remove();
  if (cont) cont.remove();
  if (sessionLogs._custom && sessionLogs._custom[exIdx] && sessionLogs._custom[exIdx].sets[setIdx].drops) {
    sessionLogs._custom[exIdx].sets[setIdx].drops.splice(dropIdx, 1);
  }
}

function removeCustomExercise(idx) {
  const card = document.getElementById('custom-ex-' + idx);
  if (card) card.remove();
  if (sessionLogs._custom && sessionLogs._custom[idx]) {
    sessionLogs._custom[idx] = null;
  }
}


function getSuggestion(exId, isVolumeDay, isAnchor, relatedId) {
  // Deload week: drop weight, higher reps
  if (isDeloadWeek) {
    const all = getAllHistory(exId);
    let bestWeight = 0;
    all.forEach(s => {
      if (!s.sets) return;
      s.sets.forEach(set => {
        const w = parseFloat(set.weight);
        if (!isNaN(w) && w > bestWeight) bestWeight = w;
      });
    });
    if (bestWeight > 0) {
      if (isAnchor) {
        // Anchors: 65% weight, 12-15 reps, +1 set (set count handled in renderExercise)
        const deloadWeight = Math.round((bestWeight * 0.65) / 5) * 5;
        return { note: 'Deload — 65% of best', arrow: '↓', recWeight: deloadWeight, lastWeight: bestWeight, maxReps: 0, lastDate: '', repTarget: '12–15 reps', isVolume: true, isDeload: true };
      } else {
        // Accessories: 75% weight, same sets, higher reps
        const deloadWeight = Math.round((bestWeight * 0.75) / 5) * 5;
        return { note: 'Deload — 75% of best', arrow: '↓', recWeight: deloadWeight, lastWeight: bestWeight, maxReps: 0, lastDate: '', repTarget: '12–15 reps', isVolume: true, isDeload: true };
      }
    }
    // No direct history - try relatedId for deload extras
    if (relatedId) {
      const relStored = JSON.parse(localStorage.getItem('hist_' + relatedId) || '[]');
      const relBuiltin = HISTORY[relatedId] || [];
      const relAll = [...relBuiltin, ...relStored];
      let relBest = 0;
      relAll.forEach(s => {
        if (!s.sets) return;
        s.sets.forEach(set => {
          const w = parseFloat(set.weight);
          if (!isNaN(w) && w > relBest) relBest = w;
        });
      });
      if (relBest > 0) {
        const deloadWeight = Math.round((relBest * 0.75) / 5) * 5;
        return { note: 'Deload — 75% of related', arrow: '↓', recWeight: deloadWeight, lastWeight: relBest, maxReps: 0, lastDate: '', repTarget: '12–15 reps', isVolume: true, isDeload: true };
      }
    }
  }
  const all = getAllHistory(exId);
  if (!all.length) return null;

  const last = all[all.length - 1];
  if (!last.sets || !last.sets.length) return null;

  const lastWeights = last.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
  const lastReps = last.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
  if (!lastReps.length) return null;
  const lastWeight = lastWeights.length ? Math.max(...lastWeights) : 0;
  const maxReps = Math.max(...lastReps);
  const avgReps = lastReps.reduce((a,b) => a+b, 0) / lastReps.length;

  // Epley 1RM estimate: weight * (1 + reps/30)
  function estimate1RM(weight, reps) {
    return weight * (1 + reps / 30);
  }

  // Find best estimated 1RM across ALL sessions
  let best1RM = 0;
  let bestSessionWeight = 0;
  let bestSessionReps = 0;
  all.forEach(session => {
    if (!session.sets) return;
    session.sets.forEach(s => {
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
      const est = estimate1RM(w, r);
      if (est > best1RM) {
        best1RM = est;
        bestSessionWeight = w;
        bestSessionReps = r;
      }
    });
  });

  if (!isAnchor) {
    return { note: 'Hold weight —', arrow: '→', recWeight: lastWeight, lastWeight, maxReps, lastDate: last.date, isVolume: false };
  }

  if (isVolumeDay) {
    const looksLikeHeavy = avgReps <= 7;
    if (looksLikeHeavy) {
      const volWeight = lastWeight > 0 ? Math.round((lastWeight * 0.875) / 5) * 5 : 0;
      return { note: 'Est. from heavy —', arrow: '→', recWeight: volWeight, lastWeight, maxReps, lastDate: last.date, repTarget: '8–12 reps', isVolume: true };
    } else {
      let recWeight = lastWeight;
      let arrow = '→';
      let note = '';
      if (avgReps >= 11) {
        const bump = lastWeight >= 200 ? 5 : lastWeight >= 100 ? 5 : 2.5;
        recWeight = lastWeight + bump;
        arrow = '↑';
        note = 'Top of range — push to';
      } else if (avgReps >= 8) {
        note = 'Stay in range —';
      } else {
        note = 'Build here — stay at';
      }
      return { note, arrow, recWeight, lastWeight, maxReps, lastDate: last.date, repTarget: '8–12 reps', isVolume: true };
    }
  } else {
    // Heavy day: derive working weight from best 1RM estimate across ALL sessions
    // Target ~85% of estimated 1RM for a solid 4-8 rep working weight
    const heavyFromBest1RM = best1RM > 0 ? Math.round((best1RM * 0.85) / 5) * 5 : lastWeight;

    let recWeight = Math.max(lastWeight, heavyFromBest1RM);
    let arrow = '→';
    let note = '';

    if (heavyFromBest1RM > lastWeight + 5) {
      // Volume sessions indicate capacity beyond last heavy weight
      recWeight = heavyFromBest1RM;
      arrow = '↑';
      note = 'Capacity up — try';
    } else if (avgReps >= 7.5) {
      const bump = lastWeight >= 200 ? 5 : lastWeight >= 100 ? 5 : lastWeight > 0 ? 2.5 : 0;
      recWeight = lastWeight + bump;
      arrow = '↑';
      note = 'Looking strong — try';
    } else if (avgReps <= 5) {
      note = 'Build here — stay at';
    } else {
      note = 'Match last session —';
    }
    return { note, arrow, recWeight, lastWeight, maxReps, lastDate: last.date, isVolume: false };
  }
}

function renderExercise(ex, isVol) {
  const log = sessionLogs[ex.id] || {};
  // Deload week: bump sets by 1 for anchors, keep accessories same
  const deloadSets = isDeloadWeek && ex.anchor ? (ex.defaultSets || 3) + 1 : (ex.defaultSets || 3);
  const sets = log.sets || Array(deloadSets).fill(null).map(() => ({ weight: '', reps: '' }));
  const sugg = getSuggestion(ex.id, isVol, ex.anchor, ex.relatedId);
  const anchorClass = ex.anchor ? (ex.anchorVol ? ' anchor-vol' : ' anchor') : '';
  const customName = localStorage.getItem('name_' + ex.id);
  const displayName = customName || ex.name;
  const targetClass = isVol ? ' vol-target' : '';

  let suggHtml = '';
  if (sugg) {
    const weightDisplay = sugg.recWeight > 0 ? `${sugg.recWeight}lbs` : 'BW';
    const lastDisplay = sugg.lastWeight > 0 ? `${sugg.lastWeight}lbs` : 'BW';
    const repHint = (sugg.isVolume || sugg.isDeload) ? `<span style="color:${sugg.isDeload ? 'var(--orange)' : 'var(--orange)'};font-size:11px;margin-left:6px;">@ ${sugg.repTarget}</span>` : '';
    suggHtml = `<div class="suggestion-box">
      <div class="sugg-title">💡 Suggested</div>
      <div class="sugg-val">${sugg.arrow} ${weightDisplay}${repHint}</div>
      <div class="sugg-last">${sugg.note} — last: ${lastDisplay} × ${sugg.maxReps} (${sugg.lastDate})</div>
    </div>`;
  }

  let setsHtml = '';
  sets.forEach((s, i) => {
    const dropSets = s.drops || [];
    let dropHtml = '';
    dropSets.forEach((d, di) => {
      dropHtml += buildDropSetRow(ex.id, i, di, d.weight, d.reps, 0);
    });
    const hasNote = s.note && s.note.trim().length > 0;
    setsHtml += `<div class="set-entry">
      <span class="set-num">S${i+1}</span>
      <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
        value="${s.weight||''}" onchange="updateSet('${ex.id}',${i},'weight',this.value)"/>
      <span style="color:var(--muted);font-size:12px">×</span>
      <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" onchange="updateSet('${ex.id}',${i},'reps',this.value)"/>
      <button class="drop-set-link" onclick="addDropSet('${ex.id}', ${i}, 0, this)">↓ drop</button>
      <button class="set-notes-toggle ${hasNote ? 'has-note' : ''}" onclick="toggleSetNote(this, '${ex.id}', ${i})">✎ note</button>
    </div>
    <div class="set-notes-area ${hasNote ? 'open' : ''}" id="set-note-area-${ex.id}-${i}">
      <textarea class="set-note-input" placeholder="How did that feel? Anything to note..."
        oninput="updateSetNote('${ex.id}', ${i}, this.value)">${s.note || ''}</textarea>
    </div>
    <div id="drops-${ex.id}-${i}-0">${dropHtml}</div>`;
  });

  const isAnchorCard = ex.anchor || ex.anchorVol;
  return `<div class="exercise-card${anchorClass}" data-exid="${ex.id}" data-anchor="${isAnchorCard ? '1' : '0'}">
    <button class="move-btn move-btn-up" onclick="moveCard(this, -1)" title="Move up">▲</button>
    <button class="promote-btn" onclick="toggleAnchor(this)" title="${isAnchorCard ? 'Remove anchor' : 'Promote to anchor'}" style="position:absolute;top:8px;right:84px;width:22px;height:22px;background:${isAnchorCard ? 'var(--accent-dim)' : 'var(--card2)'};border:1px solid ${isAnchorCard ? 'rgba(200,241,53,.4)' : 'var(--border)'};border-radius:4px;color:${isAnchorCard ? 'var(--accent)' : 'var(--muted)'};font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;">★</button>
    <button class="move-btn move-btn-down" onclick="moveCard(this, 1)" title="Move down">▼</button>
    <button class="delete-exercise-btn" onclick="deleteExerciseCard(this)" title="Remove">✕</button>
    <div class="exercise-header">
      <div>
        <div class="exercise-name" contenteditable="true" spellcheck="false"
          style="outline:none;border-bottom:1px dashed var(--border);min-width:60px;"
          onblur="renameExercise('${ex.id}', this.textContent.trim())"
          title="Tap to rename">${displayName}</div>
        <div class="exercise-note">${ex.note}</div>
      </div>
    </div>
    <div style="padding:2px 14px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:${isDeloadWeek && ex.anchor ? 'var(--orange)' : 'var(--muted)'}">${isDeloadWeek && ex.anchor ? (deloadSets) + ' sets × 12–15 — deload' : ex.target}</div>
    <div class="log-area">
      ${suggHtml}
      <div id="sets-${ex.id}">${setsHtml}</div>
      <button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add Set</button>
    </div>
  </div>`;
}

function updateSet(exId, setIndex, field, value) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];
  while (sessionLogs[exId].sets.length <= setIndex) sessionLogs[exId].sets.push({ weight:'', reps:'' });
  sessionLogs[exId].sets[setIndex][field] = value;
}

function addSet(exId) {
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  if (!sessionLogs[exId].sets) sessionLogs[exId].sets = [];
  sessionLogs[exId].sets.push({ weight:'', reps:'', drops:[] });
  const container = document.getElementById('sets-' + exId);
  const setIndex = sessionLogs[exId].sets.length - 1;
  const div = document.createElement('div');
  div.className = 'set-entry';
  div.innerHTML = `<span class="set-num">S${setIndex+1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      onchange="updateSet('${exId}',${setIndex},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      onchange="updateSet('${exId}',${setIndex},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addDropSet('${exId}', ${setIndex}, 0, this)">↓ drop</button>
    <button class="set-notes-toggle" onclick="toggleSetNote(this, '${exId}', ${setIndex})">✎ note</button>`;
  container.appendChild(div);
  // Add note area
  const noteArea = document.createElement('div');
  noteArea.className = 'set-notes-area';
  noteArea.id = `set-note-area-${exId}-${setIndex}`;
  noteArea.innerHTML = `<textarea class="set-note-input" placeholder="How did that feel? Anything to note..." oninput="updateSetNote('${exId}', ${setIndex}, this.value)"></textarea>`;
  container.appendChild(noteArea);
  const dropContainer = document.createElement('div');
  dropContainer.id = `drops-${exId}-${setIndex}-0`;
  container.appendChild(dropContainer);
}

async function saveDay() {
  // Handle tracking-only mode
  if (isTrackingOnly) {
    if (currentTrackingDay === null || currentTrackingDay >= trackingDays.length) return;

    const day = trackingDays[currentTrackingDay];
    day.exercises = sessionLogs._custom || [];
    day.lastLogged = new Date().toISOString().split('T')[0];

    localStorage.setItem('trackingDays', JSON.stringify(trackingDays));

    // Save to exercise history
    if (sessionLogs._custom) {
      sessionLogs._custom.forEach(ex => {
        const hist = JSON.parse(localStorage.getItem('hist_' + ex.id) || '[]');
        const sets = ex.sets.filter(s => s.weight || s.reps);
        if (sets.length > 0) {
          hist.push({ date: new Date().toISOString().split('T')[0], sets: sets });
          if (hist.length > 50) hist.shift();
          localStorage.setItem('hist_' + ex.id, JSON.stringify(hist));
        }
      });
    }

    showSaveSuccess();
    sessionLogs = { _date: new Date().toISOString().split('T')[0], _feel: 7, _notes: '', _custom: [] };
    renderTrackingExercises();
    return;
  }

  const day = PROGRAM[currentDay];
  if (day.rest) return;
  const variant = getCurrentVariant(currentDay);
  const savedDayIndex = currentDay;
  let prMsg = null;

  try {
    const dateEl = document.getElementById('sessionDate');
    sessionLogs._date = dateEl ? dateEl.value : new Date().toISOString().split('T')[0];
    const feelEl = document.getElementById('feelSlider');
    const notesEl = document.getElementById('sessionNotes');
    if (feelEl) sessionLogs._feel = parseInt(feelEl.value);
    if (notesEl) sessionLogs._notes = notesEl.value;
    await saveToDB('log_' + variant.id, sessionLogs);

    variant.sections.forEach(section => {
      section.exercises.forEach(ex => {
        const exercises = ex.superset ? ex.exercises : [ex];
        exercises.forEach(e => {
          if (sessionLogs[e.id] && sessionLogs[e.id].sets && sessionLogs[e.id].sets.length) {
            const hist = JSON.parse(localStorage.getItem('hist_' + e.id) || '[]');
            hist.push({ date: sessionLogs._date, sets: sessionLogs[e.id].sets, heavy: variant.tag === 'heavy', notes: (sessionLogs[e.id].sets || []).map(s => s.note || '').filter(Boolean) });
            if (hist.length > 12) hist.shift();
            localStorage.setItem('hist_' + e.id, JSON.stringify(hist));
          }
        });
      });
    });

    const histKey = getHistKey(variant);
    const allSessions = JSON.parse(localStorage.getItem(histKey) || '[]');

    // Build superset group map by reading the LIVE DOM, not the static program data.
    // This captures the actual on-screen arrangement including any pairs made via
    // "Pair Existing Exercises" or "Add Superset", and reflects manual reordering.
    const mainEl = document.getElementById('mainContent');
    const exIdToGroup = {};       // preset exercise id -> group id
    const customIdxToGroup = {};  // custom exercise array index -> group id
    let domGroupCounter = 0;

    if (mainEl) {
      mainEl.querySelectorAll('.superset-block').forEach(block => {
        const groupId = 'ss-' + (domGroupCounter++);
        // Preset cards inside this block
        block.querySelectorAll('.exercise-card[data-exid]').forEach(card => {
          exIdToGroup[card.dataset.exid] = groupId;
        });
        // Custom cards inside this block
        block.querySelectorAll('.custom-exercise-card').forEach(card => {
          const idx = card.id ? parseInt(card.id.replace('custom-ex-', '')) : null;
          if (idx !== null && !isNaN(idx)) customIdxToGroup[idx] = groupId;
        });
      });
    }

    // Build sessionExercises by walking the LIVE DOM in actual visual order,
    // so preset and custom exercises that are supersetted together end up
    // consecutive in the saved array regardless of which type they are or
    // which "loop" they'd normally come from.
    const sessionExercises = [];
    if (mainEl) {
      const allCards = [...mainEl.querySelectorAll('.exercise-card[data-exid], .custom-exercise-card')];
      allCards.forEach(card => {
        if (card.classList.contains('exercise-card')) {
          const eId = card.dataset.exid;
          const log = sessionLogs[eId];
          if (log && log.sets && log.sets.some(s => s.weight || s.reps)) {
            const customName = localStorage.getItem('name_' + eId);
            // Look up the original exercise object for its default name as fallback
            let defaultName = customName;
            if (!defaultName) {
              variant.sections.forEach(section => {
                section.exercises.forEach(ex => {
                  const exList = ex.superset ? ex.exercises : [ex];
                  exList.forEach(e => { if (e.id === eId) defaultName = e.name; });
                });
              });
            }
            sessionExercises.push({ name: defaultName || eId, sets: log.sets, supersetGroup: exIdToGroup[eId] || null });
          }
        } else if (card.classList.contains('custom-exercise-card')) {
          const idx = card.id ? parseInt(card.id.replace('custom-ex-', '')) : null;
          if (idx === null || isNaN(idx)) return;
          const ex = (sessionLogs._custom || [])[idx];
          if (ex && ex.name && ex.sets && ex.sets.some(s => s.weight || s.reps)) {
            sessionExercises.push({ ...ex, supersetGroup: customIdxToGroup[idx] || null });
          }
        }
      });
    }

    if (sessionExercises.length) {
      allSessions.push({
        date: sessionLogs._date,
        week: (variant.tag === 'heavy' ? 'HEAVY' : 'VOLUME') + ' · ' + (isWeekA ? 'Week A' : 'Week B'),
        feel: sessionLogs._feel || null,
        notes: sessionLogs._notes || '',
        exercises: sessionExercises
      });
      if (allSessions.length > 8) allSessions.shift();
      localStorage.setItem(histKey, JSON.stringify(allSessions));
    }

    const newPRs = checkForPRs(variant, sessionLogs);
    prMsg = newPRs.length > 0
      ? (newPRs.length === 1 ? '🏆 New PR — ' + newPRs[0].name + ' ' + newPRs[0].weight + 'lbs × ' + newPRs[0].reps + '!' : '🏆 ' + newPRs.length + ' New PRs this session!')
      : null;
  } catch (err) {
    console.error('saveDay error (data was still saved, continuing to clear):', err);
  }

  // ALWAYS run, even if something above threw an error
  const dot = document.getElementById('dot-' + savedDayIndex);
  if (dot) dot.classList.add('has-log');
  showSaveSuccess(prMsg);
  sessionLogs = {};
  justSavedDay = savedDayIndex;
  renderDay(savedDayIndex);
}

function showSaveSuccess(prMsg) {
  const existing = document.getElementById('save-success-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'save-success-overlay';
  overlay.className = 'save-success-overlay';

  const icon = document.createElement('div');
  icon.className = 'save-success-icon';
  icon.textContent = prMsg ? '🏆' : '✓';

  const title = document.createElement('div');
  title.className = 'save-success-title';
  title.textContent = 'SAVED';

  const subtitle = document.createElement('div');
  subtitle.className = 'save-success-subtitle';
  subtitle.textContent = prMsg ? prMsg : 'Workout logged successfully. Inputs cleared for your next session.';

  overlay.appendChild(icon);
  overlay.appendChild(title);
  overlay.appendChild(subtitle);
  document.body.appendChild(overlay);

  setTimeout(() => {
    overlay.style.transition = 'opacity 0.3s ease';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 300);
  }, 1200);
}

function clearDay() {
  if (!confirm('Clear this day\'s log?')) return;
  if (isTrackingOnly) {
    sessionLogs = { _date: new Date().toISOString().split('T')[0], _feel: 7, _notes: '', _custom: [] };
    renderTrackingExercises();
  } else {
    sessionLogs = {};
    renderDay(currentDay);
  }
}

async function saveToDB(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); } catch(e) { localStorage.setItem(key, JSON.stringify(value)); }
}

async function loadFromDB(key) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
  catch(e) { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
}


function toggleWeek() {
  if (isDeloadWeek) {
    isDeloadWeek = false;
  } else {
    isWeekA = !isWeekA;
  }
  setWeekBadge();
  loadDay(currentDay);
}

function toggleDeload() {
  isDeloadWeek = !isDeloadWeek;
  setWeekBadge();
  loadDay(currentDay);
}

function renameExercise(exId, newName) {
  if (!newName) return;
  // Store custom name in localStorage
  localStorage.setItem('name_' + exId, newName);
}

// ─── DROP SETS ────────────────────────────────────────────────
function buildDropSetRow(exId, setIdx, dropIdx, weight, reps, depth) {
  const indent = depth * 20;
  const id = `drops-${exId}-${setIdx}-${dropIdx + 1}`;
  return `<div class="drop-set-row" style="padding-left:${20 + indent}px;" id="droprow-${exId}-${setIdx}-${dropIdx}">
    <span class="drop-set-label">D${dropIdx + 1}</span>
    <input class="log-input" style="width:75px" type="number" inputmode="decimal" placeholder="lbs"
      value="${weight||''}" onchange="updateDropSet('${exId}',${setIdx},${dropIdx},'weight',this.value)"/>
    <span style="color:var(--muted);font-size:12px">×</span>
    <input class="log-input" style="width:60px" type="number" inputmode="numeric" placeholder="reps"
      value="${reps||''}" onchange="updateDropSet('${exId}',${setIdx},${dropIdx},'reps',this.value)"/>
    <button class="drop-set-link" onclick="addDropSet('${exId}', ${setIdx}, ${dropIdx + 1}, this)">↓ drop</button>
    <button class="drop-set-remove" onclick="removeDropSet('${exId}',${setIdx},${dropIdx},this)">✕</button>
  </div>
  <div id="${id}"></div>`;
}

function addDropSet(exId, setIdx, dropIdx, btn) {
  // Find or create drops array on the set
  if (!sessionLogs[exId]) sessionLogs[exId] = { sets: [] };
  while (sessionLogs[exId].sets.length <= setIdx) sessionLogs[exId].sets.push({ weight:'', reps:'' });
  if (!sessionLogs[exId].sets[setIdx].drops) sessionLogs[exId].sets[setIdx].drops = [];

  // Insert new drop at dropIdx position
  sessionLogs[exId].sets[setIdx].drops.splice(dropIdx, 0, { weight:'', reps:'' });

  // Find container to insert into
  const containerId = dropIdx === 0
    ? `drops-${exId}-${setIdx}-0`
    : `drops-${exId}-${setIdx}-${dropIdx}`;

  const container = document.getElementById(containerId);
  if (!container) return;

  const div = document.createElement('div');
  div.innerHTML = buildDropSetRow(exId, setIdx, dropIdx, '', '', 0);
  container.insertAdjacentHTML('beforeend', buildDropSetRow(exId, setIdx, dropIdx, '', '', 0));
}

function updateDropSet(exId, setIdx, dropIdx, field, value) {
  if (!sessionLogs[exId] || !sessionLogs[exId].sets[setIdx] || !sessionLogs[exId].sets[setIdx].drops) return;
  if (sessionLogs[exId].sets[setIdx].drops[dropIdx]) {
    sessionLogs[exId].sets[setIdx].drops[dropIdx][field] = value;
  }
}

function removeDropSet(exId, setIdx, dropIdx, btn) {
  const row = document.getElementById(`droprow-${exId}-${setIdx}-${dropIdx}`);
  const container = document.getElementById(`drops-${exId}-${setIdx}-${dropIdx + 1}`);
  if (row) row.remove();
  if (container) container.remove();
  if (sessionLogs[exId] && sessionLogs[exId].sets[setIdx] && sessionLogs[exId].sets[setIdx].drops) {
    sessionLogs[exId].sets[setIdx].drops.splice(dropIdx, 1);
  }
}


// ─── EDIT SESSION ─────────────────────────────────────────────
function editSession(histKey, sessionIdx) {
  const sessions = JSON.parse(localStorage.getItem(histKey) || '[]');

  if (!session) return;

  const overlay = document.createElement('div');
  overlay.className = 'edit-modal-overlay';
  overlay.id = 'edit-modal-overlay';

  let exercisesHtml = '';
  (session.exercises || []).forEach((ex, exIdx) => {
    const setsHtml = (ex.sets || []).map((s, si) => `
      <div class="set-entry">
        <span class="set-num">S${si+1}</span>
        <input class="log-input" style="width:70px" type="number" inputmode="decimal" placeholder="lbs"
          value="${s.weight||''}" onchange="updateEditSet(${exIdx},${si},'weight',this.value)"/>
        <span style="color:var(--muted);font-size:12px">×</span>
        <input class="log-input" style="width:55px" type="number" inputmode="numeric" placeholder="reps"
          value="${s.reps||''}" onchange="updateEditSet(${exIdx},${si},'reps',this.value)"/>
        <button class="drop-set-remove" onclick="removeEditSet(${exIdx},${si},this)" style="font-size:13px;">✕</button>
      </div>`).join('');

      <div class="custom-exercise-card" style="margin-bottom:8px;" id="edit-ex-${exIdx}">
        <div class="custom-exercise-header">
          <input class="custom-exercise-input" type="text" value="${ex.name}" oninput="updateEditExName(${exIdx}, this.value)"/>
          <button class="remove-exercise-btn" onclick="document.getElementById('edit-ex-${exIdx}').remove()" title="Remove exercise">✕</button>
        </div>
        <div class="log-area">
          <div id="edit-sets-${exIdx}">${setsHtml}</div>
          <button class="add-set-btn" onclick="addEditSet(${exIdx})">+ Add Set</button>
        </div>
      </div>`;
  });

  overlay.innerHTML = `
    <div class="edit-modal">
      <div class="edit-modal-title">
        <span>Edit Session — ${session.date}</span>
        <button class="edit-modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="edit-modal-label">How did you feel?</div>
      <div class="edit-feel-row">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:32px;">Feel</span>
        <input type="range" class="feel-slider" id="editFeelSlider" min="1" max="10"
          value="${session.feel || 7}" oninput="updateEditFeel(this.value)"/>
        <span class="feel-value" id="editFeelValue">${session.feel || 7}</span>
        <span class="feel-emoji" id="editFeelEmoji">${getFeel(session.feel || 7)}</span>
      </div>
      <div class="edit-modal-label">Session Notes</div>
      <textarea class="edit-notes-ta" id="editNotesTA" placeholder="Add notes about this session...">${session.notes || ''}</textarea>
      <div class="edit-modal-label" style="margin-top:16px;">Exercises &amp; Sets</div>
      <div id="edit-exercises-list">${exercisesHtml}</div>
      <button class="edit-save-btn" onclick="saveEditSession('${histKey}', ${sessionIdx})">Save Changes</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeEditModal(); });
  window._editSessionData = JSON.parse(JSON.stringify(session.exercises || []));
}

function updateEditFeel(val) {
  const valEl = document.getElementById('editFeelValue');
  const emojiEl = document.getElementById('editFeelEmoji');
  if (valEl) { valEl.textContent = val; valEl.style.color = val <= 4 ? '#ff6b6b' : val <= 6 ? 'var(--muted)' : 'var(--accent)'; }
  if (emojiEl) emojiEl.textContent = getFeel(parseInt(val));
}

function updateEditExName(exIdx, val) {
  if (window._editSessionData && window._editSessionData[exIdx]) {

function saveEditSession(histKey, sessionIdx) {
  const sessions = JSON.parse(localStorage.getItem(histKey) || '[]');
  if (!sessions[sessionIdx]) return;
  const feelEl = document.getElementById('editFeelSlider');
  const notesEl = document.getElementById('editNotesTA');
  if (feelEl) sessions[sessionIdx].feel = parseInt(feelEl.value);
  if (notesEl) sessions[sessionIdx].notes = notesEl.value;

  // Save exercise edits - only keep exercises whose cards still exist in DOM
  if (window._editSessionData) {
    const updatedExercises = window._editSessionData.filter((ex, exIdx) => {
      return !!document.getElementById('edit-ex-' + exIdx);
    }).map(ex => ({
      ...ex,
      sets: (ex.sets || []).filter(s => s.weight || s.reps)
    })).filter(ex => ex.sets.length > 0);
    sessions[sessionIdx].exercises = updatedExercises;
  }

  localStorage.setItem(histKey, JSON.stringify(sessions));
  closeEditModal();
  loadDay(currentDay);
  showToast('Session updated!');
}

// ─── ANCHOR LIFTS FOR PROGRESS ────────────────────────────────
const ANCHOR_LIFTS = (() => {
  // If using a generated program, extract anchors dynamically
  if (_generatedProgram) {
    const seen = new Set();
    const anchors = [];
    _generatedProgram.forEach(day => {
      if (day.rest) return;
      [day.weekA, day.weekB].forEach(variant => {
        if (!variant || !variant.sections) return;
        variant.sections.forEach(sec => {
          sec.exercises.forEach(ex => {
            const exList = ex.superset ? ex.exercises : [ex];
            exList.forEach(e => {
              if (e.anchor && !seen.has(e.id)) {
                seen.add(e.id);
                anchors.push({ id: e.id, name: e.name });
              }
            });
          });
        });
      });
    });
    return anchors;
  }
  return [];
})();

// Real logged data always wins over the built-in seed/placeholder history.
// Seed data is ONLY used as a fallback when an exercise has never been logged
// for real, so old placeholder dates can never contaminate or out-rank actual
// sessions once they exist.
function getAllHistory(exId) {
  const stored = JSON.parse(localStorage.getItem('hist_' + exId) || '[]');
  if (stored.length > 0) {
    return [...stored].sort((a, b) => a.date > b.date ? 1 : -1);
  }
  const builtin = HISTORY[exId] || [];
  return [...builtin].sort((a, b) => a.date > b.date ? 1 : -1);
}

function epley1RM(weight, reps) {
  return weight * (1 + reps / 30);
}

function getLifePR(exId) {
  const all = getAllHistory(exId);
  let pr = null;
  let prEstimate = 0;
  all.forEach(session => {
    if (!session.sets) return;
    const reps = session.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
    const avgReps = reps.length ? reps.reduce((a,b) => a+b,0) / reps.length : 0;
    const isHeavy = session.heavy !== undefined ? session.heavy : avgReps <= 8;
    if (!isHeavy) return;
    session.sets.forEach(s => {
      const w = parseFloat(s.weight);
      const r = parseInt(s.reps);
      if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
      const est = epley1RM(w, r);
      if (est > prEstimate) {
        prEstimate = est;
        pr = { weight: w, reps: r, date: session.date, estimated1RM: Math.round(est) };
      }
    });
  });
  return pr;
}

function renderProgressChart(exId) {
  const chartArea = document.getElementById('chart-area');
  if (!exId) { chartArea.innerHTML = ''; return; }

  const lift = ANCHOR_LIFTS.find(l => l.id === exId);
  const all = getAllHistory(exId);

  // Build data points - max weight per HEAVY session only
  // For builtin history (no heavy tag), infer from avg reps - low reps = heavy
  const dataPoints = [];
  all.forEach(session => {
    if (!session.sets) return;
    const weights = session.sets.map(s => parseFloat(s.weight)).filter(w => !isNaN(w) && w > 0);
    const reps = session.sets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
    if (!weights.length || !reps.length) return;
    const avgReps = reps.reduce((a,b) => a+b, 0) / reps.length;
    // Use explicit heavy tag if available, otherwise infer from reps
    const isHeavy = session.heavy !== undefined ? session.heavy : avgReps <= 8;
    if (!isHeavy) return;
    dataPoints.push({ date: session.date, weight: Math.max(...weights) });
  });

  if (dataPoints.length < 2) {
    chartArea.innerHTML = `<div class="no-data-msg">Log at least 2 sessions to see your progress chart.</div>`;
    return;
  }

  // Draw SVG chart
  const W = 320, H = 160, PAD = { top: 10, right: 10, bottom: 30, left: 40 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;

  const weights = dataPoints.map(d => d.weight);
  const minW = Math.min(...weights) * 0.95;
  const maxW = Math.max(...weights) * 1.05;

  const xScale = i => PAD.left + (i / (dataPoints.length - 1)) * innerW;
  const yScale = w => PAD.top + innerH - ((w - minW) / (maxW - minW)) * innerH;

  // Build path
  const pts = dataPoints.map((d, i) => `${xScale(i)},${yScale(d.weight)}`);
  const pathD = 'M ' + pts.join(' L ');

  // Fill area
  const fillD = pathD + ` L ${xScale(dataPoints.length-1)},${H-PAD.bottom} L ${xScale(0)},${H-PAD.bottom} Z`;

  // Y axis labels
  const yLabels = [minW, (minW+maxW)/2, maxW].map(w => ({
    y: yScale(w),
    label: Math.round(w)
  }));

  // X axis labels (first, middle, last)
  const xLabels = [0, Math.floor(dataPoints.length/2), dataPoints.length-1].map(i => ({
    x: xScale(i),
    label: dataPoints[i].date.slice(5) // MM-DD
  }));

  // Dots for data points
  const dots = dataPoints.map((d, i) => `<circle cx="${xScale(i)}" cy="${yScale(d.weight)}" r="3" fill="var(--accent)" stroke="var(--black)" stroke-width="1.5"/>`).join('');

  // PR point
  const prIdx = weights.indexOf(Math.max(...weights));
  const prDot = `<circle cx="${xScale(prIdx)}" cy="${yScale(dataPoints[prIdx].weight)}" r="5" fill="#ffd700" stroke="var(--black)" stroke-width="1.5"/>`;

  const svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="chart-canvas">
    <defs>
      <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c8f135" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#c8f135" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- Grid lines -->
    ${yLabels.map(l => `<line x1="${PAD.left}" y1="${l.y}" x2="${W-PAD.right}" y2="${l.y}" stroke="#2a2a2a" stroke-width="1"/>`).join('')}
    <!-- Fill area -->
    <path d="${fillD}" fill="url(#chartGrad)"/>
    <!-- Line -->
    <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Dots -->
    ${dots}
    ${prDot}
    <!-- Y labels -->
    ${yLabels.map(l => `<text x="${PAD.left-4}" y="${l.y+4}" text-anchor="end" font-family="monospace" font-size="9" fill="#6b6b6b">${l.label}</text>`).join('')}
    <!-- X labels -->
    ${xLabels.map(l => `<text x="${l.x}" y="${H-8}" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6b6b">${l.label}</text>`).join('')}
    <!-- Axis -->
    <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${H-PAD.bottom}" stroke="#2a2a2a" stroke-width="1"/>
    <line x1="${PAD.left}" y1="${H-PAD.bottom}" x2="${W-PAD.right}" y2="${H-PAD.bottom}" stroke="#2a2a2a" stroke-width="1"/>
  </svg>`;

  const pr = getLifePR(exId);
  const prText = pr ? `🏆 PR: ${pr.weight}lbs × ${pr.reps} on ${pr.date} (est. 1RM ~${pr.estimated1RM}lbs)` : '';

  chartArea.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">${lift ? lift.name : exId} — Heavy Days — Max Weight</div>
      ${svg}
      ${pr ? `<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#ffd700;margin-top:8px;text-align:center;">${prText}</div>` : ''}
    </div>
  `;
}

function renderPRList(lifts) {
  const prList = document.getElementById('pr-list');
  if (!prList) return;

  const prs = lifts.map(lift => {
    const pr = getLifePR(lift.id);
    return pr ? { ...lift, pr } : null;
  }).filter(Boolean).sort((a, b) => b.pr.weight - a.pr.weight);

  if (!prs.length) {
    prList.innerHTML = '<div class="no-data-msg">No data yet — log some workouts and your PRs will appear here.</div>';
    return;
  }

  prList.innerHTML = prs.map(item => `
    <div class="pr-card">
      <div>
        <div class="pr-name">${item.name}</div>
        <div class="pr-date">${item.pr.date}</div>
      </div>
      <div style="text-align:right;">
        <div class="pr-weight">${item.pr.weight}lbs × ${item.pr.reps}</div>
        <div class="pr-reps">est. 1RM ~${item.pr.estimated1RM}lbs</div>
      </div>
    </div>
  `).join('');
}

// ─── PR DETECTION ON SAVE ─────────────────────────────────────
function checkForPRs(variant, sessionLogs) {
  const newPRs = [];
  if (variant.tag !== 'heavy') return newPRs; // Only check PRs on heavy days
  if (isDeloadWeek) return newPRs; // No PRs on deload week
  variant.sections.forEach(section => {
    section.exercises.forEach(ex => {
      const exList = ex.superset ? ex.exercises : [ex];
      exList.forEach(e => {
        if (!e.anchor) return;
        const log = sessionLogs[e.id];
        if (!log || !log.sets) return;
        // Find best estimated 1RM from today's session
        let bestEst = 0;
        let bestSet = null;
        log.sets.forEach(s => {
          const w = parseFloat(s.weight);
          const r = parseInt(s.reps);
          if (isNaN(w) || isNaN(r) || w <= 0 || r <= 0) return;
          const est = epley1RM(w, r);
          if (est > bestEst) { bestEst = est; bestSet = { weight: w, reps: r }; }
        });
        if (!bestSet) return;
        const pr = getLifePR(e.id);
        const prEst = pr ? pr.estimated1RM : 0;
        if (bestEst > prEst) {
          newPRs.push({ name: e.name, weight: bestSet.weight, reps: bestSet.reps, estimated1RM: Math.round(bestEst), id: e.id });
        }
      });
    });
  });
  return newPRs;
}
