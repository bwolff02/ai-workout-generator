<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bryce's Program">
<meta name="theme-color" content="#0d0d0d">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bryce's Program</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --black:#0d0d0d;--dark:#151515;--card:#1c1c1c;--card2:#222;--border:#2a2a2a;
    --accent:#c8f135;--accent-dim:rgba(200,241,53,0.12);
    --blue:#64b4ff;--blue-dim:rgba(100,180,255,0.08);
    --orange:#ff9f43;--orange-dim:rgba(255,159,67,0.1);
    --green:#4ade80;--white:#f0f0f0;--muted:#6b6b6b;--input-bg:#252525;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--black);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:100px;}
  header{background:var(--dark);border-bottom:1px solid var(--border);padding:48px 20px 0;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  .program-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.03em;line-height:1;}
  h1 span{color:var(--accent);}
  .week-indicator{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .week-badge{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;letter-spacing:.08em;}
  .week-badge.week-a{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,241,53,.4);}
  .week-badge.week-b{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,159,67,.4);}
  .week-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;}
  .day-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin:0 -20px;padding:0 20px;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:all .2s;}
  .tab:hover{color:var(--white);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:middle;opacity:0;}
  .tab-dot.has-log{opacity:1;}
  main{padding:20px;max-width:640px;margin:0 auto;}
  .day-content{display:none;}
  .day-content.active{display:block;}
  .day-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
  .day-number{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;margin-bottom:3px;}
  .day-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;line-height:1;}
  .day-subtitle{font-size:12px;color:var(--muted);margin-top:3px;font-weight:300;}
  .tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;padding:3px 8px;border-radius:4px;text-transform:uppercase;margin-top:4px;display:inline-block;}
  .tag-heavy{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,241,53,.3);}
  .tag-volume{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,159,67,.3);}
  .session-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .session-date-input{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:12px;padding:8px 12px;flex:1;outline:none;}
  .session-date-input:focus{border-color:var(--accent);}
  .section{margin-bottom:24px;}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;}
  .exercise-card.anchor{border-left:3px solid var(--accent);}
  .exercise-card.anchor-vol{border-left:3px solid var(--orange);}
  .exercise-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .exercise-name{font-weight:600;font-size:13px;line-height:1.3;}
  .exercise-note{font-size:11px;color:var(--muted);font-weight:300;line-height:1.4;margin-top:2px;}
  .exercise-target{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);white-space:nowrap;flex-shrink:0;text-align:right;}
  .exercise-target.vol-target{color:var(--orange);}
  .exercise-target .target-label{font-size:9px;color:var(--muted);display:block;margin-bottom:1px;}
  .log-area{background:var(--card2);border-top:1px solid var(--border);padding:10px 14px 12px;}
  .suggestion-box{background:rgba(100,180,255,0.08);border:1px solid rgba(100,180,255,0.2);border-radius:6px;padding:8px 12px;margin-bottom:10px;}
  .suggestion-box .sugg-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;}
  .suggestion-box .sugg-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--white);}
  .suggestion-box .sugg-last{font-size:11px;color:var(--muted);margin-top:2px;}
  .set-entry{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
  .set-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:24px;flex-shrink:0;}
  .log-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:7px 10px;width:100%;outline:none;text-align:center;-webkit-appearance:none;}
  .log-input:focus{border-color:var(--accent);}
  .log-input::placeholder{color:var(--muted);font-weight:400;}
  .add-set-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:none;border:1px dashed rgba(200,241,53,.3);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;margin-top:4px;}
  .superset-block{border:1px solid rgba(100,180,255,.3);border-radius:10px;padding:4px;margin-bottom:6px;background:rgba(100,180,255,.03);}
  .superset-header{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.15em;text-transform:uppercase;padding:6px 10px 4px;}
  .superset-block .exercise-card{margin-bottom:3px;border-radius:7px;}
  .superset-block .exercise-card:last-child{margin-bottom:0;}
  .superset-divider{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);padding:2px 0;}
  .rest-day{text-align:center;padding:80px 24px;}
  .rest-icon{font-size:44px;margin-bottom:16px;}
  .rest-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.05em;color:var(--muted);margin-bottom:12px;}
  .rest-desc{font-size:13px;color:var(--muted);max-width:340px;margin:0 auto;line-height:1.7;font-weight:300;}
  .save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--border);padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:200;}
  .btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .btn-accent{background:var(--accent);color:var(--black);font-weight:600;}
  .btn-ghost{background:var(--card);color:var(--muted);border:1px solid var(--border);}
  .save-bar .btn{flex:1;padding:12px;font-size:12px;}

  .history-section{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);}
  .history-section-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .history-toggle-btn{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;letter-spacing:.1em;}
  .history-entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;}
  .history-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .history-entry-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);}
  .history-entry-week{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;}
  .history-exercise{margin-bottom:6px;}
  .history-exercise-name{font-size:11px;font-weight:600;color:var(--white);margin-bottom:2px;}
  .history-sets{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .add-exercise-section{margin-top:16px;}
  .add-exercise-btn{width:100%;padding:12px;background:var(--card);border:1px dashed var(--accent);border-radius:10px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .custom-exercise-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-top:6px;overflow:hidden;}
  .custom-exercise-header{padding:10px 14px;display:flex;align-items:center;gap:8px;}
  .custom-exercise-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:13px;font-weight:600;padding:6px 10px;flex:1;outline:none;}
  .custom-exercise-input:focus{border-color:var(--accent);}
  .remove-exercise-btn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;}


  .exercise-card { position: relative; }
  .move-btns { display: none; } /* handled individually */
  .move-btn {
    position: absolute;
    top: 8px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s;
    z-index: 10;
  }
  .move-btn:active { background: var(--accent); color: var(--black); border-color: var(--accent); }
  .move-btn-up { right: 56px; }
  .move-btn-down { right: 28px; }
  .exercise-card .exercise-header { padding-left: 14px; padding-right: 114px; }
  .exercise-card.anchor .exercise-header,
  .exercise-card.anchor-vol .exercise-header { padding-left: 14px; padding-right: 114px; }


  .delete-exercise-btn {
    position: absolute;
    top: 8px; right: 6px;
    width: 22px; height: 22px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.2s;
    z-index: 10;
  }
  .delete-exercise-btn:active { color: #ff6b6b; background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.4); }


  .add-superset-btn {
    width:100%;padding:12px;background:var(--card);
    border:1px dashed rgba(100,180,255,0.4);border-radius:10px;
    color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;
  }
  .superset-mode-banner {
    background:rgba(100,180,255,0.08);border:1px solid rgba(100,180,255,0.3);
    border-radius:8px;padding:10px 14px;margin-bottom:10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);
    display:flex;align-items:center;justify-content:space-between;
  }
  .superset-mode-cancel {
    background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 4px;
  }
  .exercise-card.superset-pick-target,
  .custom-exercise-card.superset-pick-target {
    border: 1px dashed rgba(100,180,255,0.6) !important;
    cursor:pointer;
  }
  .exercise-card.superset-pick-target:hover,
  .custom-exercise-card.superset-pick-target:hover {
    border-color: var(--blue) !important;
    background: rgba(100,180,255,0.05);
  }
  .exercise-card.superset-selected,
  .custom-exercise-card.superset-selected {
    border: 2px solid var(--blue) !important;
  }


  .drop-set-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--blue);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 0 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .drop-set-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 4px;
    padding-left: 20px;
    border-left: 2px solid rgba(100,180,255,0.3);
    margin-left: 8px;
  }
  .drop-set-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--blue);
    width: 24px;
    flex-shrink: 0;
    letter-spacing: .05em;
  }
  .drop-set-remove {
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 2px;
    flex-shrink: 0;
  }


  .session-meta {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .session-meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .feel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .feel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 32px;
    flex-shrink: 0;
  }
  .feel-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }
  .feel-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--black);
  }
  .feel-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .feel-emoji {
    font-size: 18px;
    flex-shrink: 0;
    width: 24px;
  }
  .session-notes-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 300;
    padding: 10px 12px;
    outline: none;
    resize: none;
    min-height: 70px;
    line-height: 1.5;
  }
  .session-notes-input:focus { border-color: var(--accent); }
  .session-notes-input::placeholder { color: var(--muted); }


  .export-btn {
    width: 100%;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
    transition: all 0.2s;
  }
  .export-btn:active { border-color: var(--accent); color: var(--accent); }
  .import-area {
    margin-top: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .import-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .import-textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 10px 12px;
    outline: none;
    resize: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .import-textarea:focus { border-color: var(--accent); }
  .import-btn {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
  }


  .history-edit-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    background: none;
    border: 1px solid rgba(200,241,53,0.3);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .edit-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: flex;
    align-items: flex-end;
  }
  .edit-modal {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
  }
  .edit-modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .edit-modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
  }
  .edit-feel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .edit-modal-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    margin-bottom: 6px;
  }
  .edit-notes-ta {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    resize: none;
    min-height: 80px;
    line-height: 1.5;
  }
  .edit-notes-ta:focus { border-color: var(--accent); }
  .edit-save-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--black);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer;
  }


  .progress-container { padding: 0 0 40px; }
  .progress-header { margin-bottom: 20px; }
  .progress-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: .04em; }
  .progress-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 300; }
  .lift-selector {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 12px 14px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .chart-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    position: relative;
  }
  .chart-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .chart-canvas { width: 100%; height: 180px; display: block; }
  .pr-section { margin-bottom: 20px; }
  .pr-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .18em;

    text-transform: uppercase;

  .pr-card {
    background: var(--card);
